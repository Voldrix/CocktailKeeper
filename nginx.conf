server {
	listen 443 ssl;
	listen 80;
	server_name ckeeper.cc;
	http2 on;
	return 301 https://cocktailkeeper.cc$request_uri;
	ssl_session_cache shared:SSL:2m;
	ssl_session_timeout 1m;
	ssl_protocols TLSv1.3 TLSv1.2;
	ssl_prefer_server_ciphers on;
	ssl_ciphers ECDH+AESGCM:ECDH+AES256:ECDH+AES128:DHE+AES128:!ADH:!AECDH:!MD5;
	ssl_dhparam /etc/nginx/dhparam.pem;
	tcp_nodelay on;
	access_log off;
    ssl_certificate /etc/letsencrypt/live/ckeeper.cc/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/ckeeper.cc/privkey.pem; # managed by Certbot
}

server {
	listen 80;
	listen 443 ssl;
	server_name cocktailkeeper.cc;
	root /var/www/cocktailkeeper;
	ssl_session_cache shared:SSL:2m;
	ssl_session_timeout 1m;
	ssl_protocols TLSv1.3 TLSv1.2;
	ssl_prefer_server_ciphers on;
	ssl_ciphers ECDH+AESGCM:ECDH+AES256:ECDH+AES128:DHE+AES128:!ADH:!AECDH:!MD5;
	ssl_dhparam /etc/nginx/dhparam.pem;
	index index.html;
	gzip off;
	autoindex off;
	tcp_nodelay on;
	if ($request_method = HEAD) {return 444;}

	location / {
		if ($request_uri ~ \.) {return 404;}
		if ($is_args) {return 404;}
		try_files /index.html =404;
		add_header cache-control "public, max-age=43200, immutable";
	}

	location = /robots.txt {
		add_header cache-control "public, max-age=43200, immutable";
	}

	location ~ \.(css|png|js|ico|svg)$ {
		access_log off;
		#try_files $uri =404;
		add_header cache-control "public, max-age=43200, immutable";
	}

	location /api/ {
		add_header Cache-Control "no-store";
		include fastcgi_params;
		fastcgi_param SCRIPT_FILENAME /var/www/cocktailkeeper/api.php;
		fastcgi_param SCRIPT_NAME api.php;
		fastcgi_pass unix:/run/php/php8.1-fpm.sock;
	}

    ssl_certificate /etc/letsencrypt/live/cocktailkeeper.cc/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/cocktailkeeper.cc/privkey.pem; # managed by Certbot
}

